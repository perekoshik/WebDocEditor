<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LegalEdit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" />
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="brand">LegalEdit</div>
        <nav class="nav">
            <a class="nav-item active" data-view="documents" href="#">Все документы</a>
            <a class="nav-item" data-view="templates" href="#">Шаблоны</a>
        </nav>
    </aside>
    <main class="main">
        <div class="topbar">
            <div class="search">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="7"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input id="search" type="text" placeholder="Поиск по названию" />
            </div>
            <button id="new-doc" class="btn primary">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span id="new-doc-label">Новый документ</span>
            </button>
        </div>
        <div id="dropzone" class="dropzone">
            <div id="cards" class="cards"></div>
            <div id="empty" class="empty hidden">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
                <h2>Перетащите документ сюда</h2>
                <p>Или нажмите «Новый документ». Поддерживаются .docx, .doc, .odt, .rtf, .txt</p>
            </div>
        </div>
    </main>
</div>
<input id="file-input" type="file" accept=".docx,.doc,.odt,.rtf,.txt" hidden />
<script type="module" src="/js/index.js"></script>
</body>
</html>
